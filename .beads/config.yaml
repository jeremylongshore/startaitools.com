# Repository-level Beads configuration. The authoritative issue store is the
# embedded Dolt database declared in metadata.json.

# Keep a passive JSONL export for recovery/interchange, but do not try to stage
# it: .beads/issues.jsonl is intentionally ignored by Git.
export:
  auto: true
  git-add: false

# Maintain local rolling backups in .beads/backup/.
backup:
  enabled: true
  interval: 15m
  git-push: false

# Use the same GitHub repository as the Dolt issue-history remote. Dolt stores
# its data separately from source branches under refs/dolt/data.
sync:
  remote: https://github.com/jeremylongshore/startaitools.com.git
