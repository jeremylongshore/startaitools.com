baseURL = "https://startaitools.com/"
title = "Start AI Tools - Presented by Intent Solutions"
author = "Jeremy Longshore"
copyright = "Intent Solutions. All rights reserved."
languageCode = "en-US"
theme = "archie"

# Generate a nice robots.txt for SEO
enableRobotsTXT = true

[pagination]
pagerSize = 10

[permalinks]
blog = "/:slug/"
posts = "/posts/:slug/"
monthly-recaps = "/monthly-recaps/:slug/"

[taxonomies]
tag = "tags"
category = "categories"

[params]
description = "AI systems, shipped in production. Field notes, deep-dives, and case studies from Intent Solutions."
favicon = "images/favicon.png"
og_image = "images/og-default.png"
title = "Start AI Tools - Presented by Intent Solutions"
twitter_handle = "@asphaltcowb0y"
intentsolutions_url = "https://intentsolutions.io"
hideMadeWithLine = false
enablePostNavigator = false
dateFormat = "02 Jan, 2006"
customCSS = ["css/custom.css"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = 'friendly'
    lineNos = false
    lineNumbersInTable = false
    codeFences = true

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    name = "Features"
    url = "/features/"
    weight = 12
  [[menu.main]]
    name = "Recaps"
    url = "/monthly-recaps/"
    weight = 15
  [[menu.main]]
    name = "Research"
    url = "/research/"
    weight = 25
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 30
  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 35
# Local-build compatibility (added 2026-06-25): Hugo 0.163+ (local snap) added a
# security.allowContent policy that refuses to assemble the text/html files inside
# the bundled content/mcp-for-beginners/ tutorial mini-repo. Netlify's pinned
# 0.150.0 has no such policy, so this only affects local builds + the cron's local
# build gate. Whitelisting text/html restores the pre-0.163 behavior; harmless on
# 0.150 (unknown keys are ignored).
[security]
  allowContent = ['^text/']
